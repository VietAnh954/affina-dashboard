name: Build Dashboard Data

on:
  # Cron schedules (gio VN - 7 = gio UTC)
  # 07:11 VN = 00:11 UTC
  # 14:27 VN = 07:27 UTC
  # Giam tu 5 xuong 2 lan/ngay de giam load Supabase (Phase 0)
  schedule:
    - cron: '11 0 * * *'
    - cron: '27 7 * * *'
  # Cho phép chạy tay từ GitHub UI
  workflow_dispatch:
  # Chạy khi push code build script (test change)
  push:
    branches: [main]
    paths:
      - 'scripts/build_dashboard_data.py'
      - 'requirements-actions.txt'
      - '.github/workflows/build_dashboard.yml'

# Chỉ cho phép 1 run duplicated cùng thời điểm
concurrency:
  group: build-dashboard-data
  cancel-in-progress: false

jobs:
  build:
    name: Build & Push Dashboard Data
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-actions.txt

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-actions.txt

      - name: 🚀 Run build_dashboard_data.py
        env:
          SUPABASE_DB_URI:      ${{ secrets.SUPABASE_DB_URI }}
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          TZ: Asia/Ho_Chi_Minh
          PYTHONUNBUFFERED: '1'
        run: python scripts/build_dashboard_data.py

      - name: 📦 Upload serving.parquet to GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create data-latest \
            --title "Dashboard Data (latest)" \
            --notes "Auto-updated by GitHub Actions" \
            --latest=false 2>/dev/null || true
          gh release upload data-latest serving.parquet --clobber
          echo "Uploaded serving.parquet to release data-latest"

      - name: 📊 Job Summary
        if: always()
        run: |
          echo "## Build Dashboard Data — $(date '+%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Dashboard: https://affina-dashboard.streamlit.app" >> $GITHUB_STEP_SUMMARY
