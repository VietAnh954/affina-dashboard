# =============================================================================
# AFFINA BRAND THEME — Hồng pastel (extracted từ logo + website affina.com.vn)
# =============================================================================
# Palette gốc trích từ brand:
#   Logo pink:      #F850F8 (magenta rực)
#   Footer purple:  #7038A0 → #B868D0 → #D078E0 (gradient tím)
#
# Dashboard dùng phiên bản PASTEL của các màu trên để dịu mắt khi nhìn số liệu
# lâu, nhưng vẫn nhận diện được brand Affina.
# =============================================================================

[theme]
# Màu nhấn chính — hồng Affina (nút, slider, link, tab active)
primaryColor = "#E85BD8"

# Nền chính — trắng ngả hồng cực nhẹ
backgroundColor = "#FFFAFE"

# Nền phụ (sidebar, input, expander) — hồng pastel nhạt
secondaryBackgroundColor = "#F9EBF7"

# Chữ — tím than đậm (đọc tốt trên nền hồng nhạt, thay vì đen thuần)
textColor = "#3D2B4F"

# Font
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
